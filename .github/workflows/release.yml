name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build frontend & bindings
        run: wails build -s

      - name: Generate Windows resource (icon)
        run: go run github.com/akavel/rsrc@latest -ico build/windows/icon.ico -o rsrc_windows_amd64.syso

      - name: Compile with stripped symbols
        run: go build -tags "desktop,production" -trimpath -ldflags="-H windowsgui -s -w" -o build/bin/key-stats.exe .

      - name: Read release notes
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $file = "docs/releases/${tag}.md"
          if (Test-Path $file) {
            echo "path=$file" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "KeyStats ${{ github.ref_name }}"
          body_path: ${{ steps.notes.outputs.path }}
          files: build/bin/key-stats.exe
